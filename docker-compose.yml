services:
  backend:
    build: ./Server
    ports:
      - "5000:5000"
    volumes:
      - ./Server:/app
      - /app/node_modules
    env_file:
      - ./Server/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: nodemon -L server.js

  frontend:
    build: ./Client
    ports:
      - "3000:3000"
    volumes:
      - ./Client:/app
      - /app/node_modules
    env_file:
      - ./Client/.env
    environment:
      - HOST=0.0.0.0
    depends_on:
      - backend
